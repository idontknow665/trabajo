<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escaner reciclaje</title>
    <script src="https://thunkable.github.io/webviewer-extension/thunkableWebviewerExtension.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f0f2f5; margin: 0; padding: 20px; }
        .contenedor-camara { position: relative; width: 320px; height: 320px; margin: 0 auto; border-radius: 15px; overflow: hidden; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .ovalo-guia { position: absolute; top: 15%; left: 15%; width: 70%; height: 70%; border: 4px dashed #00ff00; border-radius: 50%; pointer-events: none; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 25px; cursor: pointer; margin-top: 20px; font-weight: bold; width: 80%; max-width: 250px; }
        button:active { background: #0056b3; }
        #resultado { margin-top: 20px; font-size: 18px; font-weight: bold; color: #333; padding: 10px; border-radius: 10px; background: white; display: inline-block; min-width: 200px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <h2>Escaner reciclaje</h2>
    <p style="color: #666; font-size: 14px;">Debes mostrar un contendor de reciclaje dentro del círculo verde</p>

    <div class="contenedor-camara">
        <video id="video" autoplay playsinline></video>
        <div class="ovalo-guia"></div>
    </div>

    <button id="btn-escanear">ESCANEAR OBJETO</button>
    <br>
    <div id="resultado">Esperando fotografía...</div>

    <canvas id="canvas" width="224" height="224" style="display:none;"></canvas>

        <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const btnEscanear = document.getElementById('btn-escanear');
        const resultadoDiv = document.getElementById('resultado');
            
        navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "environment" }, 
            audio: false 
        }).then(stream => { 
            video.srcObject = stream; 
        }).catch(err => {
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(s => { video.srcObject = s; })
                .catch(e => { resultadoDiv.innerText = "Por favor, otorga permisos de cámara en tu celular"; });
        });

        btnEscanear.addEventListener('click', () => {
            resultadoDiv.innerText = "Analizando";
            resultadoDiv.style.color = "#007bff";

            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, 224, 224);

            canvas.toBlob(async (blob) => {
                const formData = new FormData();
                formData.append('file', blob, 'image.jpg');

                try {
                    const response = await fetch('https://sproutown.onrender.com/predict', {
                        method: 'POST',
                        body: formData
                    });

                    if (!response.ok) {
                        throw new Error(`Error en el servidor: ${response.status}`);
                    }

                    const data = await response.json();
                    
                    if (data && data.objeto) {
                        resultadoDiv.innerText = `${data.objeto}`;
                        resultadoDiv.style.color = "#28a745";
                        
                        ThunkableWebviewerExtension.postMessage(data.objeto);
                        
                    } else {
                        resultadoDiv.innerText = "Objeto invalido";
                        resultadoDiv.style.color = "#28a745";
                        ThunkableWebviewerExtension.postMessage("invalido");
                    }
                } catch (error) {
                    console.error(error);
                    resultadoDiv.innerText = "Error";
                    resultadoDiv.style.color = "#28a745";
                    ThunkableWebviewerExtension.postMessage("error");
                }
            }, 'image/jpeg', 0.85); 
        });
    </script>
</body>
</html>
