<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escáner IA Escolar</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f0f2f5; margin: 0; padding: 20px; }
        .contenedor-camara { position: relative; width: 320px; height: 320px; margin: 0 auto; border-radius: 15px; overflow: hidden; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        /* El óvalo guía verde para tus profesores */
        .ovalo-guia { position: absolute; top: 15%; left: 15%; width: 70%; height: 70%; border: 4px dashed #00ff00; border-radius: 50%; pointer-events: none; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 25px; cursor: pointer; margin-top: 20px; font-weight: bold; width: 80%; max-width: 250px; }
        button:active { background: #0056b3; }
        #resultado { margin-top: 20px; font-size: 18px; font-weight: bold; color: #333; padding: 10px; border-radius: 10px; background: white; display: inline-block; min-width: 200px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <h2>🎒 Escáner de Mochila</h2>
    <p style="color: #666; font-size: 14px;">Alinea el objeto dentro del óvalo verde</p>

    <div class="contenedor-camara">
        <video id="video" autoplay playsinline></video>
        <div class="ovalo-guia"></div>
    </div>

    <button id="btn-escanear">📸 ESCANEAR OBJETO</button>
    <br>
    <div id="resultado">Esperando fotografía...</div>

    <canvas id="canvas" width="224" height="224" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const btnEscanear = document.getElementById('btn-escanear');
        const resultadoDiv = document.getElementById('resultado');

        // 1. Encender la cámara del celular automáticamente
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false })
            .then(stream => { video.srcObject = stream; })
            .catch(err => { resultadoDiv.innerText = "Error al abrir la cámara: " + err; });

        // 2. Evento del botón para capturar y enviar a Render
        btnEscanear.addEventListener('click', async () => {
            resultadoDiv.innerText = "Analizando con IA... ⏳";
            resultadoDiv.style.color = "#007bff";

            // Dibujar la foto en el canvas oculto al tamaño de Teachable Machine
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, 224, 224);

            // Convertir el canvas a un archivo binario real (Blob)
            canvas.toBlob(async (blob) => {
                const formData = new FormData();
                formData.append('file', blob, 'foto.jpg');

                try {
                    // Golpear la puerta de tu servidor activo de Render
                    const response = await fetch('https://onrender.com/predecir', {
                        method: 'POST',
                        body: formData
                    });

                    const data = await response.json();
                    
                    // Mostrar el veredicto en la pantalla
                    if(data.objeto) {
                        resultadoDiv.innerText = `🎯 Resultado: ${data.objeto}`;
                        resultadoDiv.style.color = "#28a745";
                    } else {
                        resultadoDiv.innerText = "Error en el formato de respuesta";
                        resultadoDiv.style.color = "#dc3545";
                    }
                } catch (error) {
                    resultadoDiv.innerText = "Servidor desconectado. Intenta de nuevo.";
                    resultadoDiv.style.color = "#dc3545";
                }
            }, 'image/jpeg');
        });
    </script>
</body>
</html>
